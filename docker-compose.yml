version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
      - ./kartg.log:/app/kartg.log
    environment:
      - DB_PATH=/app/data/kartg.db
      - HTTP_PORT=:8080
      - LOG_LEVEL=info
      - JWT_SECRET="ваш_секретный_ключ"
      - ADMIN_PASSWORD="123"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Фронтенд для разработки (отдельно от бэкенда)
  web:
    image: node:20-alpine
    working_dir: /app/web
    volumes:
      - ./web:/app/web
    ports:
      - "3000:3000"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    profiles:
      - dev
    depends_on:
      - app
