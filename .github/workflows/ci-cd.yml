name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
env:
  PROTOC: ${HOME}/local/bin/protoc
  PROTO_PATH: api/proto
  INCLUDE_PATH: third_party:${HOME}/local/include

jobs:
  # ==================== Backend Tests ====================
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.26'
        cache: true

    - name: Install protoc & generate proto
      run: |
        go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
        go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
        go install github.com/grpc-ecosystem/grpc-gateway/v2/protoc-gen-grpc-gateway@latest
        go install github.com/grpc-ecosystem/grpc-gateway/v2/protoc-gen-openapiv2@latest
        $PROTOC -I $PROTO_PATH -I $INCLUDE_PATH \
        --go_out=. --go_opt=paths=source_relative \
        --go-grpc_out=. --go-grpc_opt=paths=source_relative \
        --grpc-gateway_out=. --grpc-gateway_opt=paths=source_relative \
        --openapiv2_out=$PROTO_PATH --openapiv2_opt=allow_merge=true,merge_file_name=kartg \
        $PROTO_PATH/service.proto


    - name: Install dependencies
      run: |
        go mod tidy

    - name: Run tests
      run: |
        go test ./... -v -coverprofile=coverage.out

    - name: Upload coverage reports
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.out
        flags: backend
        name: backend-coverage

  # ==================== Backend Lint ====================
  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.26'
        cache: true

    - name: Install golangci-lint
      run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest

    - name: Run golangci-lint
      run: golangci-lint run ./...

  # ==================== Frontend Tests ====================
  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: web/package-lock.json

    - name: Install dependencies
      run: |
        cd web
        npm ci

    - name: Run TypeScript check
      run: |
        cd web
        npx tsc --noEmit

    - name: Build frontend
      run: |
        cd web
        npm run build

  # ==================== Frontend Lint ====================
  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: web/package-lock.json

    - name: Install dependencies
      run: |
        cd web
        npm ci

  # ==================== Build Docker ====================
  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [backend-test, backend-lint, frontend-test]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker image
      run: |
        docker build -t kartg:${{ github.sha }} .

    - name: Test Docker image
      run: |
        docker run --rm kartg:${{ github.sha }} --version || true

  # ==================== Deploy (only on main branch) ====================
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [build-docker]
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Deploy notification
      run: |
        echo "🚀 Deploy triggered by commit ${{ github.sha }}"
        echo "   Branch: ${{ github.ref }}"
        echo "   Actor: ${{ github.actor }}"
        # Здесь можно добавить реальный деплой
        # Например: docker-compose push, kubectl apply, etc.
